<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="日本語" />
<meta name="theme-color" content="#ffffff" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>日本語 플래시카드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #fff; font-family: 'Noto Sans JP', 'Noto Sans KR', -apple-system, sans-serif; overscroll-behavior: none; height: 100%; width: 100%; overflow: hidden; }
  #root { height: 100%; width: 100%; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; overflow: hidden; }
  button { font-family: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = 'japanese_flashcards_standalone';
const APP_VERSION = '2026-04-23-006'; // 이 값을 바꿀 때마다 앱이 자동 업데이트됨
const VERSION_KEY = 'japanese_flashcards_version';

// 간단한 아이콘 (인라인 SVG)
const Icon = ({ name, size = 20, color = 'currentColor' }) => {
  const paths = {
    check: <polyline points="20 6 9 17 4 12"/>,
    x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
    trash: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></g>,
    book: <g><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></g>,
    left: <polyline points="15 18 9 12 15 6"/>,
    right: <polyline points="9 18 15 12 9 6"/>,
    plus: <g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>,
    loader: <g><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></g>,
    clipboard: <g><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></g>,
    refresh: <g><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></g>,
    shuffle: <g><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></g>,
    search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
    sort: <g><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></g>,
    help: <g><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

function App() {
  const [words, setWords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('list');
  const [filter, setFilter] = useState('all');
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [error, setError] = useState('');
  const [pasteText, setPasteText] = useState('');
  const [addResult, setAddResult] = useState('');
  const [sessionIds, setSessionIds] = useState([]);
  const [shuffleMode, setShuffleMode] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [sortMode, setSortMode] = useState('added'); // 'added' | 'kana' | 'meaning'

  useEffect(() => {
    // 버전 체크: 저장된 버전과 현재 버전이 다르면 캐시 무효화 후 새로고침
    try {
      const savedVersion = localStorage.getItem(VERSION_KEY);
      if (savedVersion && savedVersion !== APP_VERSION) {
        // 새 버전 감지 - 데이터는 유지하되 페이지 새로고침
        localStorage.setItem(VERSION_KEY, APP_VERSION);
        // 강제 리로드 (캐시 무시)
        window.location.reload();
        return;
      }
      localStorage.setItem(VERSION_KEY, APP_VERSION);
    } catch (e) {}

    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setWords(JSON.parse(raw));
    } catch (e) {}
    setLoading(false);
  }, []);

  const saveWords = (newWords) => {
    setWords(newWords);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newWords));
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  };

  const parsePasteInput = (text) => {
    if (!text || !text.trim()) return [];
    let cleaned = text.trim().replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();

    const startIdx = cleaned.indexOf('[');
    const endIdx = cleaned.lastIndexOf(']');
    if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
      try {
        const parsed = JSON.parse(cleaned.slice(startIdx, endIdx + 1));
        if (Array.isArray(parsed) && parsed.length > 0) {
          return parsed
            .filter(w => w && typeof w === 'object' && (w.front || w.word || w.kanji))
            .map(w => ({
              front: String(w.front || w.word || w.kanji),
              reading: String(w.reading || w.kana || w.hiragana || w.front || w.word || ''),
              meaning: String(w.meaning || w.translation || w.ko || '')
            }));
        }
      } catch (e) {}
    }

    const objectMatches = cleaned.match(/\{[^{}]*\}/g);
    if (objectMatches && objectMatches.length > 0) {
      const result = [];
      for (const match of objectMatches) {
        try {
          const w = JSON.parse(match);
          if (w && (w.front || w.word || w.kanji)) {
            result.push({
              front: String(w.front || w.word || w.kanji),
              reading: String(w.reading || w.kana || w.hiragana || w.front || w.word || ''),
              meaning: String(w.meaning || w.translation || w.ko || '')
            });
          }
        } catch (e) {}
      }
      if (result.length > 0) return result;
    }

    const lines = cleaned.split('\n').map(l => l.trim()).filter(Boolean);
    const result = [];
    for (const line of lines) {
      if (line.includes('{') || line.includes('}') || line.includes('"')) continue;
      let parts = null;
      if (line.includes('|')) parts = line.split('|').map(s => s.trim());
      else if (line.includes('\t')) parts = line.split('\t').map(s => s.trim());
      else if (line.includes(',')) parts = line.split(',').map(s => s.trim());
      else continue;
      if (parts && parts.length >= 2) {
        result.push({ front: parts[0], reading: parts[1] || parts[0], meaning: parts[2] || '' });
      }
    }
    return result;
  };

  const handleAddWords = () => {
    setError('');
    setAddResult('');
    const parsed = parsePasteInput(pasteText);
    if (parsed.length === 0) {
      setError('인식된 단어가 없습니다.');
      return;
    }
    const existingFronts = new Set(words.map(w => w.front));
    const newOnes = parsed
      .filter(w => w.front && !existingFronts.has(w.front))
      .map(w => ({
        id: Date.now() + Math.random(),
        front: w.front,
        reading: w.reading,
        meaning: w.meaning,
        status: 'unknown',
        addedAt: Date.now()
      }));
    if (newOnes.length === 0) {
      setError(`${parsed.length}개 인식했지만 모두 이미 있는 단어입니다.`);
      return;
    }
    const updated = [...words, ...newOnes];
    saveWords(updated);
    setAddResult(`${newOnes.length}개 추가됨${parsed.length - newOnes.length > 0 ? ` (${parsed.length - newOnes.length}개 중복)` : ''}`);
    setPasteText('');
  };

  const toggleStatus = (id) => {
    const cycle = { unknown: 'maybe', maybe: 'known', known: 'unknown' };
    const updated = words.map(w => w.id === id ? { ...w, status: cycle[w.status] || 'unknown', touched: true } : w);
    saveWords(updated);
  };

  const deleteWord = (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    const updated = words.filter(w => w.id !== id);
    saveWords(updated);
  };

  const filteredWords = words.filter(w => filter === 'all' ? true : w.status === filter);
  const knownCount = words.filter(w => w.status === 'known').length;
  const unknownCount = words.filter(w => w.status === 'unknown').length;
  const maybeCount = words.filter(w => w.status === 'maybe').length;

  const sessionWords = sessionIds.map(id => words.find(w => w.id === id)).filter(Boolean);

  const startStudyWithFilter = (studyFilter, shuffle = false) => {
    let target = words.filter(w => studyFilter === 'all' ? true : w.status === studyFilter);
    if (target.length === 0) return;

    if (shuffle) {
      // 순서 랜덤으로 섞기
      target = [...target].sort(() => Math.random() - 0.5);
    } else if (studyFilter === 'all') {
      // 전체 학습 시 미분류 단어(touched가 false) 우선 정렬
      target = [...target].sort((a, b) => {
        const aTouched = a.touched ? 1 : 0;
        const bTouched = b.touched ? 1 : 0;
        if (aTouched !== bTouched) return aTouched - bTouched; // 미분류(0)가 먼저
        return (a.addedAt || 0) - (b.addedAt || 0); // 그 다음 추가 순서
      });
    }

    setSessionIds(target.map(w => w.id));
    setCurrentIndex(0);
    setFlipped(false);
    setView('study');
  };

  const nextCard = () => {
    setFlipped(false);
    setCurrentIndex((prev) => (prev + 1) % sessionWords.length);
  };

  const prevCard = () => {
    setFlipped(false);
    setCurrentIndex((prev) => (prev - 1 + sessionWords.length) % sessionWords.length);
  };

  const markAndNext = (status) => {
    const currentWord = sessionWords[currentIndex];
    if (!currentWord) return;
    // touched 필드도 true로 설정 (한번이라도 분류된 단어 표시)
    const updated = words.map(w => w.id === currentWord.id ? { ...w, status, touched: true } : w);
    saveWords(updated);
    setFlipped(false);
    if (currentIndex >= sessionIds.length - 1) {
      setCurrentIndex(0);
    } else {
      setCurrentIndex(currentIndex + 1);
    }
  };

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div className="spin"><Icon name="loader" size={32} color="#9ca3af" /></div>
      </div>
    );
  }

  // PICK VIEW
  if (view === 'pick') {
    const PickButton = ({ target, label, count, color, bg }) => (
      <button
        onClick={() => startStudyWithFilter(target, shuffleMode)}
        disabled={count === 0}
        style={{ width: '100%', padding: '24px 20px', background: bg, color, border: 'none', borderRadius: 20, textAlign: 'left', cursor: count === 0 ? 'not-allowed' : 'pointer', opacity: count === 0 ? 0.4 : 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}
      >
        <div>
          <p style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px 0' }}>{label}</p>
          <p style={{ fontSize: 13, opacity: 0.7, margin: 0 }}>{count === 0 ? '단어 없음' : `${count}개 학습`}</p>
        </div>
        <Icon name="right" size={24} />
      </button>
    );

    return (
      <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', padding: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={() => setView('list')} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <h2 style={{ fontWeight: 600, margin: 0 }}>학습 범위 선택</h2>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {/* 순서 섞기 토글 */}
          <button
            onClick={() => setShuffleMode(!shuffleMode)}
            style={{
              width: '100%',
              padding: '16px 20px',
              background: shuffleMode ? '#eef2ff' : '#f9fafb',
              color: shuffleMode ? '#4338ca' : '#6b7280',
              border: shuffleMode ? '1px solid #c7d2fe' : '1px solid #e5e7eb',
              borderRadius: 16,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              fontSize: 15,
              fontWeight: 500
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="shuffle" size={18} />
              <span>순서 섞기</span>
            </div>
            <div style={{
              width: 40, height: 24, borderRadius: 12,
              background: shuffleMode ? '#4338ca' : '#d1d5db',
              position: 'relative',
              transition: 'background 200ms'
            }}>
              <div style={{
                position: 'absolute',
                top: 2, left: shuffleMode ? 18 : 2,
                width: 20, height: 20, borderRadius: '50%',
                background: '#fff',
                transition: 'left 200ms',
                boxShadow: '0 1px 2px rgba(0,0,0,0.15)'
              }} />
            </div>
          </button>
          {!shuffleMode && (
            <p style={{ fontSize: 12, color: '#9ca3af', margin: '-4px 4px 4px', lineHeight: 1.5 }}>
              전체 학습 시 아직 분류하지 않은 단어를 우선으로 보여줍니다
            </p>
          )}
          <PickButton target="all" label="전체 단어" count={words.length} color="#fff" bg="#111827" />
          <PickButton target="unknown" label="모르는 단어" count={unknownCount} color="#dc2626" bg="#fef2f2" />
          <PickButton target="maybe" label="애매한 단어" count={maybeCount} color="#b45309" bg="#fffbeb" />
          <PickButton target="known" label="외운 단어" count={knownCount} color="#15803d" bg="#f0fdf4" />
        </div>
      </div>
    );
  }

  // ADD VIEW
  if (view === 'add') {
    return (
      <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', padding: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={() => { setView('list'); setError(''); setAddResult(''); }} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <h2 style={{ fontWeight: 600, margin: 0 }}>단어 추가</h2>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: '#eff6ff', borderRadius: 16, padding: 16, fontSize: 14, color: '#1e3a8a', lineHeight: 1.6 }}>
            <p style={{ fontWeight: 600, margin: '0 0 8px 0' }}>💡 사용법</p>
            <p style={{ margin: 0 }}>Claude 채팅에서 받은 JSON을 아래에 붙여넣고 추가 버튼을 누르세요.</p>
          </div>
          <textarea
            value={pasteText}
            onChange={(e) => setPasteText(e.target.value)}
            placeholder={`[{"front":"勉強","reading":"べんきょう","meaning":"공부"}]`}
            style={{ width: '100%', height: 192, padding: 16, background: '#f9fafb', borderRadius: 16, border: '1px solid #e5e7eb', fontSize: 14, fontFamily: 'monospace', resize: 'none', outline: 'none' }}
          />
          {error && <div style={{ padding: '12px 16px', background: '#fef2f2', color: '#dc2626', borderRadius: 12, fontSize: 14 }}>{error}</div>}
          {addResult && <div style={{ padding: '12px 16px', background: '#f0fdf4', color: '#15803d', borderRadius: 12, fontSize: 14 }}>{addResult}</div>}
          <button onClick={handleAddWords} disabled={!pasteText.trim()} style={{ width: '100%', padding: 16, background: pasteText.trim() ? '#111827' : '#d1d5db', color: '#fff', borderRadius: 16, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, border: 'none', cursor: pasteText.trim() ? 'pointer' : 'not-allowed' }}>
            <Icon name="plus" />학습목록에 추가
          </button>
        </div>
      </div>
    );
  }

  // STUDY VIEW
  if (view === 'study') {
    const currentWord = sessionWords[currentIndex];
    if (!currentWord) {
      return (
        <div style={{ minHeight: '100vh', background: '#fff', padding: 24, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <p style={{ color: '#6b7280', marginBottom: 24 }}>학습할 단어가 없습니다</p>
          <button onClick={() => setView('list')} style={{ padding: '12px 24px', background: '#111827', color: '#fff', borderRadius: 9999, fontWeight: 500, border: 'none', cursor: 'pointer' }}>목록으로 돌아가기</button>
        </div>
      );
    }

    return (
      <div style={{ height: '100%', background: '#fff', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: 12, borderBottom: '1px solid #f3f4f6', flexShrink: 0 }}>
          <button onClick={() => setView('list')} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <span style={{ fontSize: 14, color: '#6b7280', fontWeight: 500 }}>{currentIndex + 1} / {sessionWords.length}</span>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ height: 4, background: '#f3f4f6', flexShrink: 0 }}>
          <div style={{ height: '100%', background: '#111827', width: `${((currentIndex + 1) / sessionWords.length) * 100}%`, transition: 'width 300ms' }} />
        </div>
        {/* 카드 영역 - 스와이프 제스처 적용, 높이 제한 */}
        <div
          style={{
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '16px 20px 8px',
            flexShrink: 0,
            touchAction: 'pan-y'
          }}
          onTouchStart={(e) => {
            if (e.touches.length === 1) {
              window.__swipeStartX = e.touches[0].clientX;
              window.__swipeStartY = e.touches[0].clientY;
              window.__swipeDx = 0;
            }
          }}
          onTouchMove={(e) => {
            if (window.__swipeStartX != null && e.touches.length === 1) {
              window.__swipeDx = e.touches[0].clientX - window.__swipeStartX;
              const dy = e.touches[0].clientY - window.__swipeStartY;
              // 가로 스와이프가 더 크면 세로 스크롤 방지
              if (Math.abs(window.__swipeDx) > Math.abs(dy)) {
                e.preventDefault && e.preventDefault();
              }
            }
          }}
          onTouchEnd={(e) => {
            const dx = window.__swipeDx || 0;
            const threshold = 50;
            if (Math.abs(dx) > threshold) {
              if (dx < 0) {
                nextCard(); // 왼쪽 스와이프 → 다음 카드
              } else {
                prevCard(); // 오른쪽 스와이프 → 이전 카드
              }
            }
            window.__swipeStartX = null;
            window.__swipeStartY = null;
            window.__swipeDx = 0;
          }}
        >
          <div
            onClick={() => setFlipped(!flipped)}
            style={{
              width: '100%',
              maxWidth: 440,
              height: '48vh',
              maxHeight: 420,
              minHeight: 260,
              cursor: 'pointer',
              background: flipped ? '#111827' : '#fff',
              border: flipped ? 'none' : '1px solid #e5e7eb',
              borderRadius: 24,
              boxShadow: '0 1px 3px rgba(0,0,0,0.05)',
              display: 'flex',
              flexDirection: 'column',

              justifyContent: 'center',

            }}
          >

              <p style={{ fontSize: 48, fontWeight: 500, color: '#111827', lineHeight: 1.15, textAlign: 'center', wordBreak: 'break-all', margin: 0, letterSpacing: '0.02em' }}>{currentWord.front}</p>
            ) : (
              <>
                <p style={{ fontSize: 26, color: '#fff', fontWeight: 400, textAlign: 'center', margin: 0, lineHeight: 1.2, letterSpacing: '0.02em' }}>{currentWord.reading}</p>
                <div style={{ width: 40, height: 1, background: '#4b5563', margin: '14px auto' }} />
                <p style={{ fontSize: 19, color: '#fff', fontWeight: 500, textAlign: 'center', margin: 0, lineHeight: 1.4 }}>{currentWord.meaning}</p>

        </div>
        {/* 하단 힌트 */}
        <p style={{ fontSize: 11, color: '#9ca3af', textAlign: 'center', margin: '4px 0 0 0', flexShrink: 0 }}>← 스와이프로 이동 · 탭하면 뒤집기</p>
        {/* 버튼 영역 - 위로 올라오고 크게 */}
        <div style={{ flex: 1, padding: '12px 16px 16px', display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 12, background: '#fff', minHeight: 0 }}>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => markAndNext('unknown')} style={{ flex: 1, padding: '22px 8px', background: '#fef2f2', color: '#dc2626', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="x" size={20} />몰라
            </button>
            <button onClick={() => markAndNext('maybe')} style={{ flex: 1, padding: '22px 8px', background: '#fffbeb', color: '#b45309', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="help" size={20} />애매
            </button>
            <button onClick={() => markAndNext('known')} style={{ flex: 1, padding: '22px 8px', background: '#f0fdf4', color: '#15803d', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="check" size={20} />알아
            </button>
          </div>
        </div>
      </div>
    );
  }

  // LIST VIEW
  return (
    <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
      <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', zIndex: 10 }}>
        <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: '#111827', margin: 0, letterSpacing: '-0.02em' }}>日本語 플래시카드</h1>
            <p style={{ fontSize: 12, color: '#6b7280', margin: '4px 0 0 0' }}>이 기기에 영구 저장됩니다</p>
          </div>
          <button
            onClick={() => { window.location.reload(); }}
            style={{ background: '#f3f4f6', border: 'none', borderRadius: 10, padding: 8, cursor: 'pointer', color: '#6b7280', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
            title="앱 새로고침"
          >
            <Icon name="refresh" size={18} />
          </button>
        </div>
        <div style={{ padding: '0 20px 12px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
          <button onClick={() => setFilter('all')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'all' ? '#111827' : '#f9fafb', color: filter === 'all' ? '#fff' : '#4b5563' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>전체</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{words.length}</p>
          </button>
          <button onClick={() => setFilter('unknown')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'unknown' ? '#ef4444' : '#fef2f2', color: filter === 'unknown' ? '#fff' : '#dc2626' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>몰라</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{unknownCount}</p>
          </button>
          <button onClick={() => setFilter('maybe')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'maybe' ? '#f59e0b' : '#fffbeb', color: filter === 'maybe' ? '#fff' : '#b45309' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>애매</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{maybeCount}</p>
          </button>
          <button onClick={() => setFilter('known')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'known' ? '#16a34a' : '#f0fdf4', color: filter === 'known' ? '#fff' : '#15803d' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>알아</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{knownCount}</p>
          </button>
        </div>
      </div>
      <div style={{ padding: '16px 20px', display: 'flex', gap: 12 }}>
        <button onClick={() => setView('add')} style={{ flex: 1, padding: 12, borderRadius: 12, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#f3f4f6', color: '#111827', border: 'none', cursor: 'pointer' }}>
          <Icon name="plus" />단어 추가
        </button>
        <button onClick={() => setView('pick')} disabled={words.length === 0} style={{ flex: 1, padding: 12, borderRadius: 12, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#111827', color: '#fff', border: 'none', cursor: words.length === 0 ? 'not-allowed' : 'pointer', opacity: words.length === 0 ? 0.4 : 1 }}>
          <Icon name="book" />학습 시작
        </button>
      </div>
      {/* 검색 + 정렬 바 */}
      {words.length > 0 && (
        <div style={{ padding: '0 20px 12px', display: 'flex', gap: 8, alignItems: 'center' }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: '#9ca3af', display: 'flex', alignItems: 'center', pointerEvents: 'none' }}>
              <Icon name="search" size={16} />
            </div>
            <input
              type="text"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="한자 / 발음 / 뜻으로 검색"
              style={{ width: '100%', padding: '10px 12px 10px 36px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: 12, fontSize: 14, outline: 'none', boxSizing: 'border-box', fontFamily: 'inherit' }}
            />
            {searchQuery && (
              <button
                onClick={() => setSearchQuery('')}
                style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: '#e5e7eb', border: 'none', borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: '#6b7280' }}
              >
                <Icon name="x" size={12} />
              </button>
            )}
          </div>
          <button
            onClick={() => {
              const modes = ['added', 'kana', 'meaning'];
              const idx = modes.indexOf(sortMode);
              setSortMode(modes[(idx + 1) % modes.length]);
            }}
            style={{ padding: '10px 12px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: 12, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, color: '#4b5563', fontSize: 13, fontWeight: 500, fontFamily: 'inherit', whiteSpace: 'nowrap' }}
          >
            <Icon name="sort" size={14} />
            {sortMode === 'added' ? '추가순' : sortMode === 'kana' ? '발음순' : '뜻순'}
          </button>
        </div>
      )}
      <div style={{ padding: '0 20px 80px' }}>
        {(() => {
          // 검색 + 정렬 적용
          let displayed = [...filteredWords];
          if (searchQuery.trim()) {
            const q = searchQuery.trim().toLowerCase();
            displayed = displayed.filter(w =>
              (w.front || '').toLowerCase().includes(q) ||
              (w.reading || '').toLowerCase().includes(q) ||
              (w.meaning || '').toLowerCase().includes(q)
            );
          }
          if (sortMode === 'kana') {
            displayed.sort((a, b) => (a.reading || '').localeCompare(b.reading || '', 'ja'));
          } else if (sortMode === 'meaning') {
            displayed.sort((a, b) => (a.meaning || '').localeCompare(b.meaning || '', 'ko'));
          }
          // 'added'는 기본 순서 (id가 Date.now() 기반이라 추가순)

          if (displayed.length === 0) {
            return (
              <div style={{ padding: '64px 0', textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, margin: '0 auto 16px', borderRadius: '50%', background: '#f9fafb', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="clipboard" size={28} color="#d1d5db" />
                </div>
                <p style={{ color: '#6b7280', fontSize: 14, marginBottom: 4 }}>
                  {words.length === 0 ? '아직 단어가 없습니다' : searchQuery ? '검색 결과가 없습니다' : '해당 분류에 단어가 없습니다'}
                </p>
                <p style={{ color: '#9ca3af', fontSize: 12, margin: 0 }}>
                  {words.length === 0 ? '단어 추가 버튼을 눌러 시작하세요' : searchQuery ? '다른 검색어를 시도해보세요' : '다른 탭을 선택해보세요'}
                </p>
              </div>
            );
          }
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {searchQuery && (
                <p style={{ fontSize: 12, color: '#6b7280', margin: '0 4px 4px' }}>
                  {displayed.length}개 결과
                </p>
              )}
              {displayed.map((word) => (
                <div key={word.id} style={{
                  padding: 16,
                  borderRadius: 16,
                  border: '1px solid',
                  background: word.status === 'known' ? 'rgba(240,253,244,0.5)' : word.status === 'maybe' ? 'rgba(255,251,235,0.6)' : '#fff',
                  borderColor: word.status === 'known' ? '#dcfce7' : word.status === 'maybe' ? '#fde68a' : '#f3f4f6'
                }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{ fontSize: 20, fontWeight: 600, color: '#111827', margin: '0 0 4px 0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{word.front}</p>
                      <p style={{ fontSize: 14, color: '#6b7280', margin: '0 0 4px 0' }}>{word.reading}</p>
                      <p style={{ fontSize: 14, color: '#374151', margin: 0 }}>{word.meaning}</p>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <button
                        onClick={() => toggleStatus(word.id)}
                        title="탭하면 상태 변경 (몰라 → 애매 → 알아 → 몰라)"
                        style={{
                          width: 40, height: 40, borderRadius: '50%',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          border: 'none', cursor: 'pointer',
                          background: word.status === 'known' ? '#16a34a' : word.status === 'maybe' ? '#f59e0b' : '#f3f4f6',
                          color: word.status === 'known' || word.status === 'maybe' ? '#fff' : '#9ca3af',
                          fontSize: 16, fontWeight: 700
                        }}
                      >
                        {word.status === 'known' ? <Icon name="check" /> : word.status === 'maybe' ? '?' : <Icon name="check" />}
                      </button>
                      <button onClick={() => deleteWord(word.id)} style={{ width: 40, height: 40, borderRadius: '50%', background: '#fef2f2', color: '#dc2626', display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer' }}>
                        <Icon name="trash" size={16} />
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = 'japanese_flashcards_standalone';
const APP_VERSION = '2026-04-23-006'; // 이 값을 바꿀 때마다 앱이 자동 업데이트됨
const VERSION_KEY = 'japanese_flashcards_version';

// 간단한 아이콘 (인라인 SVG)
const Icon = ({ name, size = 20, color = 'currentColor' }) => {
  const paths = {
    check: <polyline points="20 6 9 17 4 12"/>,
    x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
    trash: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></g>,
    book: <g><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></g>,
    left: <polyline points="15 18 9 12 15 6"/>,
    right: <polyline points="9 18 15 12 9 6"/>,
    plus: <g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>,
    loader: <g><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></g>,
    clipboard: <g><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></g>,
    refresh: <g><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></g>,
    shuffle: <g><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></g>,
    search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
    sort: <g><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></g>,
    help: <g><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

function App() {
  const [words, setWords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('list');
  const [filter, setFilter] = useState('all');
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [error, setError] = useState('');
  const [pasteText, setPasteText] = useState('');
  const [addResult, setAddResult] = useState('');
  const [sessionIds, setSessionIds] = useState([]);
  const [shuffleMode, setShuffleMode] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [sortMode, setSortMode] = useState('added'); // 'added' | 'kana' | 'meaning'

  useEffect(() => {
    // 버전 체크: 저장된 버전과 현재 버전이 다르면 캐시 무효화 후 새로고침
    try {
      const savedVersion = localStorage.getItem(VERSION_KEY);
      if (savedVersion && savedVersion !== APP_VERSION) {
        // 새 버전 감지 - 데이터는 유지하되 페이지 새로고침
        localStorage.setItem(VERSION_KEY, APP_VERSION);
        // 강제 리로드 (캐시 무시)
        window.location.reload();
        return;
      }
      localStorage.setItem(VERSION_KEY, APP_VERSION);
    } catch (e) {}

    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setWords(JSON.parse(raw));
    } catch (e) {}
    setLoading(false);
  }, []);

  const saveWords = (newWords) => {
    setWords(newWords);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newWords));
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  };

  const parsePasteInput = (text) => {
    if (!text || !text.trim()) return [];
    let cleaned = text.trim().replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();

    const startIdx = cleaned.indexOf('[');
    const endIdx = cleaned.lastIndexOf(']');
    if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
      try {
        const parsed = JSON.parse(cleaned.slice(startIdx, endIdx + 1));
        if (Array.isArray(parsed) && parsed.length > 0) {
          return parsed
            .filter(w => w && typeof w === 'object' && (w.front || w.word || w.kanji))
            .map(w => ({
              front: String(w.front || w.word || w.kanji),
              reading: String(w.reading || w.kana || w.hiragana || w.front || w.word || ''),
              meaning: String(w.meaning || w.translation || w.ko || '')
            }));
        }
      } catch (e) {}
    }

    const objectMatches = cleaned.match(/\{[^{}]*\}/g);
    if (objectMatches && objectMatches.length > 0) {
      const result = [];
      for (const match of objectMatches) {
        try {
          const w = JSON.parse(match);
          if (w && (w.front || w.word || w.kanji)) {
            result.push({
              front: String(w.front || w.word || w.kanji),
              reading: String(w.reading || w.kana || w.hiragana || w.front || w.word || ''),
              meaning: String(w.meaning || w.translation || w.ko || '')
            });
          }
        } catch (e) {}
      }
      if (result.length > 0) return result;
    }

    const lines = cleaned.split('\n').map(l => l.trim()).filter(Boolean);
    const result = [];
    for (const line of lines) {
      if (line.includes('{') || line.includes('}') || line.includes('"')) continue;
      let parts = null;
      if (line.includes('|')) parts = line.split('|').map(s => s.trim());
      else if (line.includes('\t')) parts = line.split('\t').map(s => s.trim());
      else if (line.includes(',')) parts = line.split(',').map(s => s.trim());
      else continue;
      if (parts && parts.length >= 2) {
        result.push({ front: parts[0], reading: parts[1] || parts[0], meaning: parts[2] || '' });
      }
    }
    return result;
  };

  const handleAddWords = () => {
    setError('');
    setAddResult('');
    const parsed = parsePasteInput(pasteText);
    if (parsed.length === 0) {
      setError('인식된 단어가 없습니다.');
      return;
    }
    const existingFronts = new Set(words.map(w => w.front));
    const newOnes = parsed
      .filter(w => w.front && !existingFronts.has(w.front))
      .map(w => ({
        id: Date.now() + Math.random(),
        front: w.front,
        reading: w.reading,
        meaning: w.meaning,
        status: 'unknown',
        addedAt: Date.now()
      }));
    if (newOnes.length === 0) {
      setError(`${parsed.length}개 인식했지만 모두 이미 있는 단어입니다.`);
      return;
    }
    const updated = [...words, ...newOnes];
    saveWords(updated);
    setAddResult(`${newOnes.length}개 추가됨${parsed.length - newOnes.length > 0 ? ` (${parsed.length - newOnes.length}개 중복)` : ''}`);
    setPasteText('');
  };

  const toggleStatus = (id) => {
    const cycle = { unknown: 'maybe', maybe: 'known', known: 'unknown' };
    const updated = words.map(w => w.id === id ? { ...w, status: cycle[w.status] || 'unknown', touched: true } : w);
    saveWords(updated);
  };

  const deleteWord = (id) => {
    if (!confirm('삭제하시겠습니까?')) return;
    const updated = words.filter(w => w.id !== id);
    saveWords(updated);
  };

  const filteredWords = words.filter(w => filter === 'all' ? true : w.status === filter);
  const knownCount = words.filter(w => w.status === 'known').length;
  const unknownCount = words.filter(w => w.status === 'unknown').length;
  const maybeCount = words.filter(w => w.status === 'maybe').length;

  const sessionWords = sessionIds.map(id => words.find(w => w.id === id)).filter(Boolean);

  const startStudyWithFilter = (studyFilter, shuffle = false) => {
    let target = words.filter(w => studyFilter === 'all' ? true : w.status === studyFilter);
    if (target.length === 0) return;

    if (shuffle) {
      // 순서 랜덤으로 섞기
      target = [...target].sort(() => Math.random() - 0.5);
    } else if (studyFilter === 'all') {
      // 전체 학습 시 미분류 단어(touched가 false) 우선 정렬
      target = [...target].sort((a, b) => {
        const aTouched = a.touched ? 1 : 0;
        const bTouched = b.touched ? 1 : 0;
        if (aTouched !== bTouched) return aTouched - bTouched; // 미분류(0)가 먼저
        return (a.addedAt || 0) - (b.addedAt || 0); // 그 다음 추가 순서
      });
    }

    setSessionIds(target.map(w => w.id));
    setCurrentIndex(0);
    setFlipped(false);
    setView('study');
  };

  const nextCard = () => {
    setFlipped(false);
    setCurrentIndex((prev) => (prev + 1) % sessionWords.length);
  };

  const prevCard = () => {
    setFlipped(false);
    setCurrentIndex((prev) => (prev - 1 + sessionWords.length) % sessionWords.length);
  };

  const markAndNext = (status) => {
    const currentWord = sessionWords[currentIndex];
    if (!currentWord) return;
    // touched 필드도 true로 설정 (한번이라도 분류된 단어 표시)
    const updated = words.map(w => w.id === currentWord.id ? { ...w, status, touched: true } : w);
    saveWords(updated);
    setFlipped(false);
    if (currentIndex >= sessionIds.length - 1) {
      setCurrentIndex(0);
    } else {
      setCurrentIndex(currentIndex + 1);
    }
  };

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div className="spin"><Icon name="loader" size={32} color="#9ca3af" /></div>
      </div>
    );
  }

  // PICK VIEW
  if (view === 'pick') {
    const PickButton = ({ target, label, count, color, bg }) => (
      <button
        onClick={() => startStudyWithFilter(target, shuffleMode)}
        disabled={count === 0}
        style={{ width: '100%', padding: '24px 20px', background: bg, color, border: 'none', borderRadius: 20, textAlign: 'left', cursor: count === 0 ? 'not-allowed' : 'pointer', opacity: count === 0 ? 0.4 : 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}
      >
        <div>
          <p style={{ fontSize: 18, fontWeight: 600, margin: '0 0 4px 0' }}>{label}</p>
          <p style={{ fontSize: 13, opacity: 0.7, margin: 0 }}>{count === 0 ? '단어 없음' : `${count}개 학습`}</p>
        </div>
        <Icon name="right" size={24} />
      </button>
    );

    return (
      <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', padding: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={() => setView('list')} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <h2 style={{ fontWeight: 600, margin: 0 }}>학습 범위 선택</h2>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {/* 순서 섞기 토글 */}
          <button
            onClick={() => setShuffleMode(!shuffleMode)}
            style={{
              width: '100%',
              padding: '16px 20px',
              background: shuffleMode ? '#eef2ff' : '#f9fafb',
              color: shuffleMode ? '#4338ca' : '#6b7280',
              border: shuffleMode ? '1px solid #c7d2fe' : '1px solid #e5e7eb',
              borderRadius: 16,
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              fontSize: 15,
              fontWeight: 500
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="shuffle" size={18} />
              <span>순서 섞기</span>
            </div>
            <div style={{
              width: 40, height: 24, borderRadius: 12,
              background: shuffleMode ? '#4338ca' : '#d1d5db',
              position: 'relative',
              transition: 'background 200ms'
            }}>
              <div style={{
                position: 'absolute',
                top: 2, left: shuffleMode ? 18 : 2,
                width: 20, height: 20, borderRadius: '50%',
                background: '#fff',
                transition: 'left 200ms',
                boxShadow: '0 1px 2px rgba(0,0,0,0.15)'
              }} />
            </div>
          </button>
          {!shuffleMode && (
            <p style={{ fontSize: 12, color: '#9ca3af', margin: '-4px 4px 4px', lineHeight: 1.5 }}>
              전체 학습 시 아직 분류하지 않은 단어를 우선으로 보여줍니다
            </p>
          )}
          <PickButton target="all" label="전체 단어" count={words.length} color="#fff" bg="#111827" />
          <PickButton target="unknown" label="모르는 단어" count={unknownCount} color="#dc2626" bg="#fef2f2" />
          <PickButton target="maybe" label="애매한 단어" count={maybeCount} color="#b45309" bg="#fffbeb" />
          <PickButton target="known" label="외운 단어" count={knownCount} color="#15803d" bg="#f0fdf4" />
        </div>
      </div>
    );
  }

  // ADD VIEW
  if (view === 'add') {
    return (
      <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
        <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', padding: 16, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button onClick={() => { setView('list'); setError(''); setAddResult(''); }} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <h2 style={{ fontWeight: 600, margin: 0 }}>단어 추가</h2>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: '#eff6ff', borderRadius: 16, padding: 16, fontSize: 14, color: '#1e3a8a', lineHeight: 1.6 }}>
            <p style={{ fontWeight: 600, margin: '0 0 8px 0' }}>💡 사용법</p>
            <p style={{ margin: 0 }}>Claude 채팅에서 받은 JSON을 아래에 붙여넣고 추가 버튼을 누르세요.</p>
          </div>
          <textarea
            value={pasteText}
            onChange={(e) => setPasteText(e.target.value)}
            placeholder={`[{"front":"勉強","reading":"べんきょう","meaning":"공부"}]`}
            style={{ width: '100%', height: 192, padding: 16, background: '#f9fafb', borderRadius: 16, border: '1px solid #e5e7eb', fontSize: 14, fontFamily: 'monospace', resize: 'none', outline: 'none' }}
          />
          {error && <div style={{ padding: '12px 16px', background: '#fef2f2', color: '#dc2626', borderRadius: 12, fontSize: 14 }}>{error}</div>}
          {addResult && <div style={{ padding: '12px 16px', background: '#f0fdf4', color: '#15803d', borderRadius: 12, fontSize: 14 }}>{addResult}</div>}
          <button onClick={handleAddWords} disabled={!pasteText.trim()} style={{ width: '100%', padding: 16, background: pasteText.trim() ? '#111827' : '#d1d5db', color: '#fff', borderRadius: 16, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, border: 'none', cursor: pasteText.trim() ? 'pointer' : 'not-allowed' }}>
            <Icon name="plus" />학습목록에 추가
          </button>
        </div>
      </div>
    );
  }

  // STUDY VIEW
  if (view === 'study') {
    const currentWord = sessionWords[currentIndex];
    if (!currentWord) {
      return (
        <div style={{ minHeight: '100vh', background: '#fff', padding: 24, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <p style={{ color: '#6b7280', marginBottom: 24 }}>학습할 단어가 없습니다</p>
          <button onClick={() => setView('list')} style={{ padding: '12px 24px', background: '#111827', color: '#fff', borderRadius: 9999, fontWeight: 500, border: 'none', cursor: 'pointer' }}>목록으로 돌아가기</button>
        </div>
      );
    }

    return (
      <div style={{ height: '100%', background: '#fff', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: 12, borderBottom: '1px solid #f3f4f6', flexShrink: 0 }}>
          <button onClick={() => setView('list')} style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#4b5563', fontWeight: 500, background: 'none', border: 'none', cursor: 'pointer' }}>
            <Icon name="left" />목록
          </button>
          <span style={{ fontSize: 14, color: '#6b7280', fontWeight: 500 }}>{currentIndex + 1} / {sessionWords.length}</span>
          <div style={{ width: 64 }} />
        </div>
        <div style={{ height: 4, background: '#f3f4f6', flexShrink: 0 }}>
          <div style={{ height: '100%', background: '#111827', width: `${((currentIndex + 1) / sessionWords.length) * 100}%`, transition: 'width 300ms' }} />
        </div>
        {/* 카드 영역 - 스와이프 제스처 적용, 높이 제한 */}
        <div
          style={{
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            padding: '16px 20px 8px',
            flexShrink: 0,
            touchAction: 'pan-y'
          }}
          onTouchStart={(e) => {
            if (e.touches.length === 1) {
              window.__swipeStartX = e.touches[0].clientX;
              window.__swipeStartY = e.touches[0].clientY;
              window.__swipeDx = 0;
            }
          }}
          onTouchMove={(e) => {
            if (window.__swipeStartX != null && e.touches.length === 1) {
              window.__swipeDx = e.touches[0].clientX - window.__swipeStartX;
              const dy = e.touches[0].clientY - window.__swipeStartY;
              // 가로 스와이프가 더 크면 세로 스크롤 방지
              if (Math.abs(window.__swipeDx) > Math.abs(dy)) {
                e.preventDefault && e.preventDefault();
              }
            }
          }}
          onTouchEnd={(e) => {
            const dx = window.__swipeDx || 0;
            const threshold = 50;
            if (Math.abs(dx) > threshold) {
              if (dx < 0) {
                nextCard(); // 왼쪽 스와이프 → 다음 카드
              } else {
                prevCard(); // 오른쪽 스와이프 → 이전 카드
              }
            }
            window.__swipeStartX = null;
            window.__swipeStartY = null;
            window.__swipeDx = 0;
          }}
        >
          <div
            onClick={() => setFlipped(!flipped)}
            style={{
              width: '100%',
              maxWidth: 440,
              height: '48vh',
              maxHeight: 420,
              minHeight: 260,
              cursor: 'pointer',
              background: flipped ? '#111827' : '#fff',
              border: flipped ? 'none' : '1px solid #e5e7eb',
              borderRadius: 24,
              boxShadow: '0 1px 3px rgba(0,0,0,0.05)',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              padding: '20px 24px',
              userSelect: 'none',
              boxSizing: 'border-box'
            }}
          >
            {!flipped ? (
              <p style={{ fontSize: 48, fontWeight: 500, color: '#111827', lineHeight: 1.15, textAlign: 'center', wordBreak: 'break-all', margin: 0, letterSpacing: '0.02em' }}>{currentWord.front}</p>
            ) : (
              <>
                <p style={{ fontSize: 26, color: '#fff', fontWeight: 400, textAlign: 'center', margin: 0, lineHeight: 1.2, letterSpacing: '0.02em' }}>{currentWord.reading}</p>
                <div style={{ width: 40, height: 1, background: '#4b5563', margin: '14px auto' }} />
                <p style={{ fontSize: 19, color: '#fff', fontWeight: 500, textAlign: 'center', margin: 0, lineHeight: 1.4 }}>{currentWord.meaning}</p>
              </>
            )}
          </div>
        </div>
        {/* 하단 힌트 */}
        <p style={{ fontSize: 11, color: '#9ca3af', textAlign: 'center', margin: '4px 0 0 0', flexShrink: 0 }}>← 스와이프로 이동 · 탭하면 뒤집기</p>
        {/* 버튼 영역 - 위로 올라오고 크게 */}
        <div style={{ flex: 1, padding: '12px 16px 16px', display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 12, background: '#fff', minHeight: 0 }}>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => markAndNext('unknown')} style={{ flex: 1, padding: '22px 8px', background: '#fef2f2', color: '#dc2626', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="x" size={20} />몰라
            </button>
            <button onClick={() => markAndNext('maybe')} style={{ flex: 1, padding: '22px 8px', background: '#fffbeb', color: '#b45309', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="help" size={20} />애매
            </button>
            <button onClick={() => markAndNext('known')} style={{ flex: 1, padding: '22px 8px', background: '#f0fdf4', color: '#15803d', borderRadius: 18, fontWeight: 600, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, border: 'none', cursor: 'pointer' }}>
              <Icon name="check" size={20} />알아
            </button>
          </div>
        </div>
      </div>
    );
  }

  // LIST VIEW
  return (
    <div style={{ height: '100%', background: '#fff', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
      <div style={{ position: 'sticky', top: 0, background: 'rgba(255,255,255,0.95)', borderBottom: '1px solid #f3f4f6', zIndex: 10 }}>
        <div style={{ padding: '16px 20px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
          <div>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: '#111827', margin: 0, letterSpacing: '-0.02em' }}>日本語 플래시카드</h1>
            <p style={{ fontSize: 12, color: '#6b7280', margin: '4px 0 0 0' }}>이 기기에 영구 저장됩니다</p>
          </div>
          <button
            onClick={() => { window.location.reload(); }}
            style={{ background: '#f3f4f6', border: 'none', borderRadius: 10, padding: 8, cursor: 'pointer', color: '#6b7280', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
            title="앱 새로고침"
          >
            <Icon name="refresh" size={18} />
          </button>
        </div>
        <div style={{ padding: '0 20px 12px', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
          <button onClick={() => setFilter('all')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'all' ? '#111827' : '#f9fafb', color: filter === 'all' ? '#fff' : '#4b5563' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>전체</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{words.length}</p>
          </button>
          <button onClick={() => setFilter('unknown')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'unknown' ? '#ef4444' : '#fef2f2', color: filter === 'unknown' ? '#fff' : '#dc2626' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>몰라</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{unknownCount}</p>
          </button>
          <button onClick={() => setFilter('maybe')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'maybe' ? '#f59e0b' : '#fffbeb', color: filter === 'maybe' ? '#fff' : '#b45309' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>애매</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{maybeCount}</p>
          </button>
          <button onClick={() => setFilter('known')} style={{ padding: '10px 8px', borderRadius: 10, textAlign: 'left', border: 'none', cursor: 'pointer', background: filter === 'known' ? '#16a34a' : '#f0fdf4', color: filter === 'known' ? '#fff' : '#15803d' }}>
            <p style={{ fontSize: 10, opacity: 0.7, margin: 0 }}>알아</p>
            <p style={{ fontSize: 18, fontWeight: 700, margin: '2px 0 0 0' }}>{knownCount}</p>
          </button>
        </div>
      </div>
      <div style={{ padding: '16px 20px', display: 'flex', gap: 12 }}>
        <button onClick={() => setView('add')} style={{ flex: 1, padding: 12, borderRadius: 12, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#f3f4f6', color: '#111827', border: 'none', cursor: 'pointer' }}>
          <Icon name="plus" />단어 추가
        </button>
        <button onClick={() => setView('pick')} disabled={words.length === 0} style={{ flex: 1, padding: 12, borderRadius: 12, fontWeight: 500, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#111827', color: '#fff', border: 'none', cursor: words.length === 0 ? 'not-allowed' : 'pointer', opacity: words.length === 0 ? 0.4 : 1 }}>
          <Icon name="book" />학습 시작
        </button>
      </div>
      {/* 검색 + 정렬 바 */}
      {words.length > 0 && (
        <div style={{ padding: '0 20px 12px', display: 'flex', gap: 8, alignItems: 'center' }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: '#9ca3af', display: 'flex', alignItems: 'center', pointerEvents: 'none' }}>
              <Icon name="search" size={16} />
            </div>
            <input
              type="text"
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="한자 / 발음 / 뜻으로 검색"
              style={{ width: '100%', padding: '10px 12px 10px 36px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: 12, fontSize: 14, outline: 'none', boxSizing: 'border-box', fontFamily: 'inherit' }}
            />
            {searchQuery && (
              <button
                onClick={() => setSearchQuery('')}
                style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', background: '#e5e7eb', border: 'none', borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: '#6b7280' }}
              >
                <Icon name="x" size={12} />
              </button>
            )}
          </div>
          <button
            onClick={() => {
              const modes = ['added', 'kana', 'meaning'];
              const idx = modes.indexOf(sortMode);
              setSortMode(modes[(idx + 1) % modes.length]);
            }}
            style={{ padding: '10px 12px', background: '#f9fafb', border: '1px solid #e5e7eb', borderRadius: 12, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, color: '#4b5563', fontSize: 13, fontWeight: 500, fontFamily: 'inherit', whiteSpace: 'nowrap' }}
          >
            <Icon name="sort" size={14} />
            {sortMode === 'added' ? '추가순' : sortMode === 'kana' ? '발음순' : '뜻순'}
          </button>
        </div>
      )}
      <div style={{ padding: '0 20px 80px' }}>
        {(() => {
          // 검색 + 정렬 적용
          let displayed = [...filteredWords];
          if (searchQuery.trim()) {
            const q = searchQuery.trim().toLowerCase();
            displayed = displayed.filter(w =>
              (w.front || '').toLowerCase().includes(q) ||
              (w.reading || '').toLowerCase().includes(q) ||
              (w.meaning || '').toLowerCase().includes(q)
            );
          }
          if (sortMode === 'kana') {
            displayed.sort((a, b) => (a.reading || '').localeCompare(b.reading || '', 'ja'));
          } else if (sortMode === 'meaning') {
            displayed.sort((a, b) => (a.meaning || '').localeCompare(b.meaning || '', 'ko'));
          }
          // 'added'는 기본 순서 (id가 Date.now() 기반이라 추가순)

          if (displayed.length === 0) {
            return (
              <div style={{ padding: '64px 0', textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, margin: '0 auto 16px', borderRadius: '50%', background: '#f9fafb', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="clipboard" size={28} color="#d1d5db" />
                </div>
                <p style={{ color: '#6b7280', fontSize: 14, marginBottom: 4 }}>
                  {words.length === 0 ? '아직 단어가 없습니다' : searchQuery ? '검색 결과가 없습니다' : '해당 분류에 단어가 없습니다'}
                </p>
                <p style={{ color: '#9ca3af', fontSize: 12, margin: 0 }}>
                  {words.length === 0 ? '단어 추가 버튼을 눌러 시작하세요' : searchQuery ? '다른 검색어를 시도해보세요' : '다른 탭을 선택해보세요'}
                </p>
              </div>
            );
          }
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {searchQuery && (
                <p style={{ fontSize: 12, color: '#6b7280', margin: '0 4px 4px' }}>
                  {displayed.length}개 결과
                </p>
              )}
              {displayed.map((word) => (
                <div key={word.id} style={{
                  padding: 16,
                  borderRadius: 16,
                  border: '1px solid',
                  background: word.status === 'known' ? 'rgba(240,253,244,0.5)' : word.status === 'maybe' ? 'rgba(255,251,235,0.6)' : '#fff',
                  borderColor: word.status === 'known' ? '#dcfce7' : word.status === 'maybe' ? '#fde68a' : '#f3f4f6'
                }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <p style={{ fontSize: 20, fontWeight: 600, color: '#111827', margin: '0 0 4px 0', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{word.front}</p>
                      <p style={{ fontSize: 14, color: '#6b7280', margin: '0 0 4px 0' }}>{word.reading}</p>
                      <p style={{ fontSize: 14, color: '#374151', margin: 0 }}>{word.meaning}</p>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <button
                        onClick={() => toggleStatus(word.id)}
                        title="탭하면 상태 변경 (몰라 → 애매 → 알아 → 몰라)"
                        style={{
                          width: 40, height: 40, borderRadius: '50%',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          border: 'none', cursor: 'pointer',
                          background: word.status === 'known' ? '#16a34a' : word.status === 'maybe' ? '#f59e0b' : '#f3f4f6',
                          color: word.status === 'known' || word.status === 'maybe' ? '#fff' : '#9ca3af',
                          fontSize: 16, fontWeight: 700
                        }}
                      >
                        {word.status === 'known' ? <Icon name="check" /> : word.status === 'maybe' ? '?' : <Icon name="check" />}
                      </button>
                      <button onClick={() => deleteWord(word.id)} style={{ width: 40, height: 40, borderRadius: '50%', background: '#fef2f2', color: '#dc2626', display: 'flex', alignItems: 'center', justifyContent: 'center', border: 'none', cursor: 'pointer' }}>
                        <Icon name="trash" size={16} />
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
